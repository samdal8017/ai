const { useState, useCallback, useRef } = React;

const STYLES = [

  { id:"funny",  label:"😂 웃긴",   desc:"exaggerated funny comic style with bold outlines" },

const STATIC_SYS = `You are a world-class SVG sticker artist specializing in high-quality emoticons for messaging apps like KakaoTalk, LINE, and iMessage. Your stickers are known for exceptional detail, charm, and professional polish.

OUTPUT FORMAT:
- Output ONLY a raw SVG element — start exactly with <svg, end exactly with </svg>
- Required attributes: width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
- NO markdown code fences, NO explanation text, NO comments outside SVG

QUALITY STANDARDS — follow ALL of these:

BACKGROUND:
- Large soft circle (r=90) centered at (100,100) as the base
- Use radial gradients for the background circle — never flat solid fills
- Add a subtle drop shadow filter on the main character group for depth

CHARACTER ANATOMY (for animal/creature stickers):
- Head: large, round, expressive — takes up ~55-65% of the composition
- Face: prominent expressive eyes with highlights (white glint circles), detailed nose, defined mouth showing clear emotion
- Eyes: use multiple layers — iris gradient, pupil, white highlight dot — never just flat circles
- Ears, limbs, tail: proportional and characteristic of the species
- Body: visible below head, not just a floating head
- Cheeks: soft blush circles (semi-transparent pink/red) for cuteness

COLORS & GRADIENTS:
- NEVER use flat solid fills for main character parts — always use linearGradient or radialGradient
- Skin/fur: gradient from lighter top to slightly darker base
- Shadows: add darker gradient patches under chin, at bottom of body
- Highlights: lighter gradient at top of head and body
- Define all gradients in a <defs> section
- Color palette: vivid, saturated, harmonious — avoid muddy or washed-out colors
- Outline strokes: 2-3px dark strokes on main shapes for definition

DETAIL & POLISH:
- Add at least 5-8 small detail elements: fur texture lines, paw pads, belly patch, inner ear color, eyebrow expressions
- Shading: use semi-transparent dark overlays (opacity 0.1-0.2) for shadows under chin, limbs
- Highlights: use semi-transparent white overlays (opacity 0.15-0.3) on top surfaces
- The character must have a clear, strong EMOTION matching the style (happy, angry, cool, etc.)
- Make it look like a professional sticker you would buy in an app store

COMPOSITION:
- Character fills 75-85% of the 200x200 frame — not too small
- Well-centered with slight breathing room at edges
- Clear visual hierarchy: background → body → head → face → details`;

const ANIMATED_SYS = `You are a world-class animated SVG sticker artist. Your stickers appear in premium messaging apps with buttery-smooth, delightful animations that bring characters to life.

OUTPUT FORMAT:
- Output ONLY a raw SVG element — start exactly with <svg, end exactly with </svg>
- Required attributes: width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
- MUST include a <style> tag inside the SVG with all @keyframes and animation rules
- NO markdown code fences, NO explanation text

ANIMATION RULES:
- ALL animations: animation-iteration-count: infinite; animation-timing-function: ease-in-out
- 3-5 distinct simultaneous animations for maximum life and personality
- Use transform-origin carefully for natural pivot points (e.g., ears pivot from base, tail from attachment point)
- Stagger animation-delay values (0s, 0.2s, 0.5s, 1s) so movements feel organic, not robotic
- Duration variety: fast blinks (0.1s), medium bounces (0.8s), slow floats (2s)

REQUIRED ANIMATIONS (pick 3-5):
1. BODY FLOAT: whole character gently bobs up/down 4-6px, duration 2s
2. EYE BLINK: scaleY(0.1) blink every 3-4s, very fast (0.1s transition)
3. EXPRESSION WIGGLE: head or ear rotates ±5-8deg, duration 1s  
4. LIMB WAVE: arm or tail swings ±15-20deg from pivot, duration 0.8s
5. CHEEK PULSE: blush cheeks scale(1) → scale(1.15), duration 1.5s
6. BACKGROUND GLOW: background circle radius pulses subtly, or opacity shifts
7. SPARKLE: small star/sparkle elements rotate or fade in/out

QUALITY STANDARDS (same as static, PLUS):
- Background: radial gradient circle with glowing pulse animation
- Character: full gradient shading, multiple detail layers
- Eyes: multi-layer with animated blink (scaleY transform on a group)
- Smooth easing: use cubic-bezier(0.45, 0, 0.55, 1) for bouncy feel
- Each animated element must have a unique, descriptive class name
- Animations must feel playful and match the character's personality`;

// Build Claude API messages depending on mode (text or image)
function buildMessages(prompt, styleDesc, animated, imageData, imageMime) {
  const action = animated
    ? `Create an ANIMATED ${styleDesc} emoticon sticker. Use looping CSS @keyframes inside a <style> tag.`
    : `Create a ${styleDesc} emoticon sticker.`;

  if (imageData) {
    // Image mode: send photo + instruction
    return [{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: imageMime, data: imageData } },
        { type: "text", text: `Look at this image carefully. ${action} The emoticon should capture the key features, expression, and character of the subject in this photo. Style: ${styleDesc}. ${prompt ? "Additional notes: " + prompt : ""}` }
      ]
    }];
  }
  // Text mode
  return [{
    role: "user",
    content: `${action}

Subject: ${prompt}

Draw a highly detailed, professional-grade sticker with:
- Gradient fills on ALL main shapes (no flat colors)
- Multi-layer eyes: iris gradient + pupil + white highlight glint
- Soft blush cheeks (semi-transparent pink circles)
- Clear emotion/expression that matches the style
- At least 6 small detail elements (fur lines, paw pads, belly patch, inner ear, eyebrows, etc.)
- Drop shadow or glow effect for depth
- Rich, saturated color palette
Aim for the quality of a paid KakaoTalk or LINE sticker set.`
  }];
}

async function callClaude(prompt, styleDesc, animated, imageData, imageMime) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      system: animated ? ANIMATED_SYS : STATIC_SYS,
      messages: buildMessages(prompt, styleDesc, animated, imageData, imageMime)
    })
  });
  const data = await res.json();
  const text = data.content?.map(b => b.text||"").join("") || "";
  const match = text.match(/<svg[\s\S]*?<\/svg>/i);
  return match ? match[0] : null;
}

async function svgToPng(svgString, size=512) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement("canvas");
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    const fixed = svgString.includes("xmlns") ? svgString : svgString.replace("<svg",'<svg xmlns="http://www.w3.org/2000/svg"');
    const blob = new Blob([fixed], { type:"image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    img.onload = () => { ctx.clearRect(0,0,size,size); ctx.drawImage(img,0,0,size,size); URL.revokeObjectURL(url); resolve(canvas.toDataURL("image/png")); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(); };
    img.src = url;
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function Spinner({ color="#a78bfa", size=22 }) {
  return <div style={{ width:size, height:size, border:`2.5px solid ${color}`, borderTopColor:"transparent", borderRadius:"50%", animation:"spin .75s linear infinite", flexShrink:0 }}/>;
}

/* ─── Image Drop Zone ─── */
function ImageDropZone({ imagePreview, onImageChange, onClear }) {
  const [dragging, setDragging] = useState(false);

  const handleFile = (file) => {
    if (!file) return;
    if (!file.type.startsWith("image/")) { alert("이미지 파일만 업로드 가능합니다."); return; }
    if (file.size > 10 * 1024 * 1024) { alert("10MB 이하 이미지만 가능합니다."); return; }
    onImageChange(file);
  };

  // input을 버튼 div 안에 직접 포함 (display:none 대신 opacity:0 + 전체 커버)
  const hiddenInput = {
    position:"absolute", top:0, left:0,
    width:"100%", height:"100%",
    opacity:0, cursor:"pointer",
    zIndex:10, fontSize:0,
  };

  const uploadBtn = (extra={}) => ({
    flex:1, padding:"16px 8px", borderRadius:14,
    fontSize:14, fontWeight:700, color:"white",
    fontFamily:"'Noto Sans KR',sans-serif",
    display:"flex", flexDirection:"column", alignItems:"center", gap:6,
    position:"relative", overflow:"hidden",
    userSelect:"none", WebkitUserSelect:"none",
    cursor:"pointer", transition:"filter .2s",
    ...extra,
  });

  return (
    <div>
      <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,.45)", marginBottom:12, letterSpacing:".07em", textTransform:"uppercase" }}>사진 업로드</div>

      {imagePreview ? (
        /* ── 미리보기 ── */
        <div style={{ display:"flex", alignItems:"flex-start", gap:16, marginBottom:4 }}>
          <div style={{ position:"relative", flexShrink:0 }}>
            <img src={imagePreview} alt="업로드 사진"
              style={{ width:110, height:110, objectFit:"cover", borderRadius:16, border:"2px solid rgba(167,139,250,.5)", display:"block" }}/>
            <button onClick={onClear}
              style={{ position:"absolute", top:-8, right:-8, width:26, height:26, borderRadius:"50%", background:"#ef4444", border:"2px solid #0d0a1a", color:"white", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, lineHeight:1 }}>×</button>
          </div>
          <div style={{ paddingTop:4 }}>
            <div style={{ fontSize:13, color:"#a78bfa", fontWeight:700, marginBottom:6 }}>✓ 사진 업로드됨</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,.35)", lineHeight:1.6, marginBottom:12 }}>스타일 선택 후<br/>생성 버튼을 눌러보세요!</div>
            <div style={{ position:"relative", display:"inline-block", background:"rgba(167,139,250,.15)", border:"1px solid rgba(167,139,250,.3)", borderRadius:10, color:"#c4b5fd", fontSize:12, fontWeight:600, padding:"7px 14px", cursor:"pointer", overflow:"hidden" }}>
              🔄 다른 사진 선택
              <input type="file" accept="image/*" style={hiddenInput}
                onChange={e=>{ handleFile(e.target.files[0]); e.target.value=""; }}/>
            </div>
          </div>
        </div>
      ) : (
        <div>
          {/* 버튼 안에 input 직접 포함 — id/htmlFor 불필요, 모든 브라우저 호환 */}
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>

            {/* 📸 카메라 — capture="environment" */}
            <div style={uploadBtn({ background:"linear-gradient(135deg,rgba(124,58,237,.35),rgba(236,72,153,.25))", border:"1.5px solid rgba(167,139,250,.4)" })}
              onMouseEnter={e=>e.currentTarget.style.filter="brightness(1.3)"}
              onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}>
              <span style={{fontSize:30,pointerEvents:"none"}}>📸</span>
              <span style={{pointerEvents:"none"}}>카메라 촬영</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,.45)",fontWeight:400,pointerEvents:"none"}}>스마트폰 카메라</span>
              <input type="file" accept="image/*" capture="environment" style={hiddenInput}
                onChange={e=>{ handleFile(e.target.files[0]); e.target.value=""; }}/>
            </div>

            {/* 🖼️ 갤러리 — capture 없음 */}
            <div style={uploadBtn({ background:"rgba(255,255,255,.07)", border:"1.5px solid rgba(255,255,255,.15)" })}
              onMouseEnter={e=>e.currentTarget.style.filter="brightness(1.35)"}
              onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}>
              <span style={{fontSize:30,pointerEvents:"none"}}>🖼️</span>
              <span style={{pointerEvents:"none"}}>갤러리 / 파일</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,.45)",fontWeight:400,pointerEvents:"none"}}>저장된 사진 선택</span>
              <input type="file" accept="image/*" style={hiddenInput}
                onChange={e=>{ handleFile(e.target.files[0]); e.target.value=""; }}/>
            </div>
          </div>

          {/* PC 드래그 앤 드롭 */}
          <div
            className={`drop-zone${dragging?" drag-over":""}`}
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
            style={{ border:"2px dashed rgba(255,255,255,.1)", borderRadius:14, padding:"14px 20px", textAlign:"center", background:"rgba(255,255,255,.02)" }}>
            <div style={{ fontSize:12, color:"rgba(255,255,255,.25)" }}>🖥️ PC는 여기에 드래그 앤 드롭 · JPG, PNG, WEBP · 최대 10MB</div>
          </div>

          onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}/>
      </div>
    </div>
  );
}

/* ─── Emoticon Card ─── */
function EmoticonCard({ svg, style, index, label, animated }) {
  const [pngLoading, setPngLoading] = useState(false);
  const [copied, setCopied] = useState(false);
  const isError = svg === "ERROR";
  const isLoading = !svg;
  const accent = animated ? "#f59e0b" : "#a78bfa";
  const btnGrad = animated ? "linear-gradient(135deg,#f59e0b,#ef4444)" : "linear-gradient(135deg,#7c3aed,#a78bfa)";
  const filename = `emoticon_${style.id}${animated?"_animated":""}`;

  const downloadSVG = () => {
    const blob = new Blob([svg],{type:"image/svg+xml"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=filename+".svg"; a.click(); URL.revokeObjectURL(url);
  };
  const downloadPNG = async () => {
    if (pngLoading) return; setPngLoading(true);
    try { const d = await svgToPng(svg,512); const a=document.createElement("a"); a.href=d; a.download=filename+".png"; a.click(); }
    catch { alert("PNG 변환 실패. SVG로 저장해주세요."); }
    finally { setPngLoading(false); }
  };
  const copySVG = () => { navigator.clipboard.writeText(svg); setCopied(true); setTimeout(()=>setCopied(false),2000); };

  return (
    <div
      style={{ background:animated?"linear-gradient(145deg,rgba(245,158,11,.09),rgba(239,68,68,.05))":"rgba(255,255,255,.06)", border:`1.5px solid ${animated?"rgba(245,158,11,.3)":"rgba(255,255,255,.12)"}`, borderRadius:22, padding:"22px 16px 18px", display:"flex", flexDirection:"column", alignItems:"center", gap:12, transition:"transform .22s,box-shadow .22s", backdropFilter:"blur(10px)", animation:"fadeSlideIn .5s ease both", animationDelay:`${index*0.07}s`, position:"relative" }}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-5px) scale(1.025)";e.currentTarget.style.boxShadow=animated?"0 18px 44px rgba(245,158,11,.18)":"0 18px 44px rgba(124,58,237,.2)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}
    >
      {animated && <div style={{ position:"absolute", top:11, right:11, background:"linear-gradient(135deg,#f59e0b,#ef4444)", borderRadius:6, fontSize:9, fontWeight:800, color:"white", padding:"3px 7px", letterSpacing:".1em" }}>▶ 애니</div>}
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:accent, background:`rgba(${animated?"245,158,11":"167,139,250"},.15)`, padding:"4px 12px", borderRadius:99 }}>{style.label}</div>

      <div style={{ width:158, height:158, borderRadius:16, overflow:"hidden", background:isError?"rgba(239,68,68,.08)":"rgba(255,255,255,.04)", display:"flex", alignItems:"center", justifyContent:"center" }}>
        {isError
          ? <div style={{textAlign:"center"}}><div style={{fontSize:28}}>😔</div><div style={{fontSize:11,color:"rgba(255,100,100,.8)",marginTop:6}}>생성 실패</div></div>
          : isLoading
            ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}><Spinner color={accent}/><span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{animated?"🎬 애니 생성 중...":"✨ 생성 중..."}</span></div>
            : <div style={{width:"100%",height:"100%"}} dangerouslySetInnerHTML={{__html:svg}}/>
        }
      </div>

      {svg && !isError && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
          <button onClick={downloadPNG} disabled={pngLoading} style={{ background:pngLoading?"rgba(255,255,255,.1)":btnGrad, border:"none", borderRadius:10, color:pngLoading?"rgba(255,255,255,.3)":"white", fontSize:12, fontWeight:700, padding:"7px 13px", cursor:pngLoading?"not-allowed":"pointer", display:"flex", alignItems:"center", gap:5, fontFamily:"'Noto Sans KR',sans-serif" }}
            onMouseEnter={e=>{if(!pngLoading)e.currentTarget.style.opacity=".82";}} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            {pngLoading?<><Spinner color="white" size={14}/> PNG</>:"↓ PNG"}
          </button>
          <button onClick={downloadSVG} style={{ background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,255,255,.15)", borderRadius:10, color:"rgba(255,255,255,.65)", fontSize:12, fontWeight:600, padding:"7px 13px", cursor:"pointer", fontFamily:"'Noto Sans KR',sans-serif" }}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.15)";e.currentTarget.style.color="white";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.08)";e.currentTarget.style.color="rgba(255,255,255,.65)";}}>↓ SVG</button>
          <button onClick={copySVG} style={{ background:copied?"rgba(52,211,153,.15)":"rgba(255,255,255,.06)", border:`1px solid ${copied?"#34d399":"rgba(255,255,255,.1)"}`, borderRadius:10, color:copied?"#34d399":"rgba(255,255,255,.5)", fontSize:12, fontWeight:600, padding:"7px 13px", cursor:"pointer", fontFamily:"'Noto Sans KR',sans-serif", transition:"all .2s" }}>
            {copied?"✓ 복사됨":"복사"}
          </button>
        </div>
      )}
    </div>
  );
}

const EXAMPLES = ["행복한 고양이","화난 강아지","졸린 판다","춤추는 토끼","우는 병아리","놀란 아보카도","윙크하는 도넛"];

/* ─── Main App ─── */
function App() {
  const [mode, setMode] = useState("text");          // "text" | "image"
  const [prompt, setPrompt] = useState("");
  const [uploadedFile, setUploadedFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [selectedStyles, setSelectedStyles] = useState(["cute","funny","cool"]);
  const [animated, setAnimated] = useState(false);
  const [results, setResults] = useState({});
  const [loading, setLoading] = useState(false);
  const [activeStyles, setActiveStyles] = useState([]);
  const [lastLabel, setLastLabel] = useState("");

  const toggleStyle = id => setSelectedStyles(p => p.includes(id)?p.filter(s=>s!==id):[...p,id]);

  const handleImageChange = (file) => {
    setUploadedFile(file);
    const url = URL.createObjectURL(file);
    setImagePreview(url);
  };

  const clearImage = () => {
    setUploadedFile(null);
    setImagePreview(null);
  };

  const canGenerate = mode==="text" ? !!prompt.trim() : !!uploadedFile;
  const btnDisabled = loading || !canGenerate || selectedStyles.length===0;

  const generate = useCallback(async () => {
    if (btnDisabled) return;
    setLoading(true); setResults({});
    const chosen = STYLES.filter(s=>selectedStyles.includes(s.id));
    setActiveStyles(chosen);
    setLastLabel(mode==="image" ? "📷 사진 기반" : prompt.trim());

    let imageData = null, imageMime = null;
    if (mode==="image" && uploadedFile) {
      imageData = await fileToBase64(uploadedFile);
      imageMime = uploadedFile.type || "image/jpeg";
    }
    const extraPrompt = mode==="image" ? (document.getElementById("image-extra-prompt")?.value||"") : prompt.trim();

    await Promise.all(chosen.map(async style => {
      try {
        const svg = await callClaude(extraPrompt, style.desc, animated, imageData, imageMime);
        setResults(p=>({...p,[style.id]:svg||"ERROR"}));
      } catch {
        setResults(p=>({...p,[style.id]:"ERROR"}));
      }
    }));
    setLoading(false);
  }, [btnDisabled, mode, prompt, uploadedFile, selectedStyles, animated]);

  return (
    <div style={{ minHeight:"100vh", background:"#0d0a1a", fontFamily:"'Noto Sans KR',sans-serif", position:"relative", overflow:"hidden" }}>
      {/* BG blobs */}
      <div style={{ position:"fixed", top:"-15%", left:"-8%", width:550, height:550, borderRadius:"50%", background:"radial-gradient(circle,rgba(124,58,237,.22) 0%,transparent 70%)", pointerEvents:"none" }}/>
      <div style={{ position:"fixed", bottom:"-18%", right:"-8%", width:480, height:480, borderRadius:"50%", background:"radial-gradient(circle,rgba(236,72,153,.16) 0%,transparent 70%)", pointerEvents:"none" }}/>

      <div style={{ maxWidth:920, margin:"0 auto", padding:"48px 22px 90px" }}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:44, animation:"fadeSlideIn .6s ease both" }}>
          <div style={{ display:"inline-block", fontSize:12, fontWeight:700, letterSpacing:".14em", color:"#a78bfa", textTransform:"uppercase", background:"rgba(167,139,250,.12)", border:"1px solid rgba(167,139,250,.3)", padding:"6px 18px", borderRadius:99, marginBottom:16 }}>AI Emoticon Studio ✦</div>
          <h1 style={{ fontFamily:"'Syne',sans-serif", fontSize:"clamp(32px,5.5vw,54px)", fontWeight:800, background:"linear-gradient(135deg,#fff 25%,#a78bfa 55%,#ec4899 100%)", backgroundSize:"200% 200%", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text", lineHeight:1.1, marginBottom:10, animation:"gradShift 4s ease infinite" }}>이모티콘 생성기</h1>
          <p style={{ color:"rgba(255,255,255,.4)", fontSize:15 }}>텍스트 또는 사진으로 나만의 이모티콘을 만들어보세요</p>
        </div>

        {/* Input Card */}
        <div style={{ background:"rgba(255,255,255,.05)", border:"1.5px solid rgba(255,255,255,.11)", borderRadius:26, padding:28, marginBottom:20, backdropFilter:"blur(14px)", animation:"fadeSlideIn .6s ease .1s both" }}>

          {/* Mode tabs */}
          <ModeTab mode={mode} setMode={m=>{ setMode(m); setResults({}); }}/>

          {/* Input area */}
          {mode === "text" ? (
            <div>
              <label style={{ display:"block", fontSize:12, fontWeight:700, color:"rgba(255,255,255,.45)", marginBottom:10, letterSpacing:".07em", textTransform:"uppercase" }}>어떤 이모티콘을 만들까요?</label>
              <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); generate(); } }}
                placeholder="예: 행복한 고양이, 화난 강아지, 졸린 판다..." rows={2}
                style={{ width:"100%", background:"rgba(255,255,255,.07)", border:"1.5px solid rgba(255,255,255,.1)", borderRadius:14, color:"white", fontSize:16, padding:"13px 15px", resize:"none", fontFamily:"'Noto Sans KR',sans-serif", lineHeight:1.6, transition:"border-color .2s" }}
                onFocus={e=>e.target.style.borderColor="rgba(167,139,250,.6)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}/>
            </div>
          ) : (
            <ImageDropZone imagePreview={imagePreview} onImageChange={handleImageChange} onClear={clearImage}/>
          )}

          {/* Style buttons */}
          <div style={{ marginTop:22 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,.45)", marginBottom:10, letterSpacing:".07em", textTransform:"uppercase" }}>스타일 선택 (복수 가능)</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {STYLES.map(s => {
                const on = selectedStyles.includes(s.id);
                return <button key={s.id} onClick={()=>toggleStyle(s.id)} style={{ background:on?"linear-gradient(135deg,rgba(124,58,237,.45),rgba(236,72,153,.3))":"rgba(255,255,255,.06)", border:`1.5px solid ${on?"rgba(167,139,250,.6)":"rgba(255,255,255,.1)"}`, borderRadius:10, color:on?"white":"rgba(255,255,255,.45)", fontSize:13, fontWeight:on?700:500, padding:"8px 15px", cursor:"pointer", fontFamily:"'Noto Sans KR',sans-serif", transition:"all .2s" }}>{s.label}</button>;
              })}
            </div>
          </div>

          {/* Animated toggle */}
          <div style={{ marginTop:22, display:"flex", alignItems:"center", gap:14 }}>
            <span style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,.45)", letterSpacing:".07em", textTransform:"uppercase" }}>움직이는 이모티콘</span>
            <button onClick={()=>setAnimated(p=>!p)} style={{ width:52, height:28, borderRadius:99, border:"none", background:animated?"linear-gradient(135deg,#f59e0b,#ef4444)":"rgba(255,255,255,.12)", position:"relative", cursor:"pointer", transition:"background .3s", flexShrink:0 }}>
              <div style={{ position:"absolute", top:3, left:animated?26:3, width:22, height:22, borderRadius:"50%", background:"white", transition:"left .25s", boxShadow:"0 2px 6px rgba(0,0,0,.3)" }}/>
            </button>
            <span style={{ fontSize:12, fontWeight:600, color:animated?"#fbbf24":"rgba(255,255,255,.25)", transition:"color .3s" }}>{animated?"🎬 애니메이션 ON":"정적 이미지"}</span>
          </div>

          {/* Generate btn */}
          <button onClick={generate} disabled={btnDisabled}
            style={{ marginTop:22, width:"100%", padding:"16px", background:btnDisabled?"rgba(255,255,255,.07)":animated?"linear-gradient(135deg,#f59e0b,#ef4444)":"linear-gradient(135deg,#7c3aed,#a855f7 50%,#ec4899)", border:"none", borderRadius:14, color:btnDisabled?"rgba(255,255,255,.28)":"white", fontSize:16, fontWeight:700, cursor:btnDisabled?"not-allowed":"pointer", fontFamily:"'Noto Sans KR',sans-serif", letterSpacing:".03em", transition:"opacity .2s" }}
            onMouseEnter={e=>{ if(!btnDisabled) e.currentTarget.style.opacity=".88"; }} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            {loading
              ? `${animated?"🎬":"✨"} ${selectedStyles.length}개 생성 중...`
              : mode==="image"
                ? `${animated?"🎬 움직이는 ":"✨ "}사진으로 이모티콘 생성 (${selectedStyles.length}개 스타일)`
                : `${animated?"🎬 움직이는":"✨"} 이모티콘 생성 (${selectedStyles.length}개 스타일)`}
          </button>
        </div>

        {/* Quick examples (text mode only) */}
        {mode === "text" && (
          <div style={{ animation:"fadeSlideIn .6s ease .2s both", marginBottom:34 }}>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.28)", marginBottom:9, fontWeight:700, letterSpacing:".09em", textTransform:"uppercase" }}>빠른 예시</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
              {EXAMPLES.map(ex => (
                <button key={ex} onClick={()=>setPrompt(ex)} style={{ background:"transparent", border:"1px solid rgba(255,255,255,.1)", borderRadius:8, color:"rgba(255,255,255,.4)", fontSize:12, padding:"5px 12px", cursor:"pointer", fontFamily:"'Noto Sans KR',sans-serif", transition:"all .2s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor="rgba(167,139,250,.5)"; e.currentTarget.style.color="rgba(167,139,250,.9)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor="rgba(255,255,255,.1)"; e.currentTarget.style.color="rgba(255,255,255,.4)"; }}>
                  {ex}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Results */}
        {(loading || Object.keys(results).length > 0) && (
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:22, animation:"fadeSlideIn .5s ease both" }}>
              <div style={{ flex:1, height:1, background:"rgba(255,255,255,.08)" }}/>
              <span style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,.35)", letterSpacing:".1em", textTransform:"uppercase", whiteSpace:"nowrap" }}>
                {lastLabel && `"${lastLabel}" 결과`}
              </span>
              <div style={{ flex:1, height:1, background:"rgba(255,255,255,.08)" }}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:18 }}>
              {activeStyles.map((style,i) =>
                <EmoticonCard key={style.id} svg={results[style.id]} style={style} index={i} label={lastLabel} animated={animated}/>
              )}
            </div>
            {Object.keys(results).length > 0 && (
              <div style={{ marginTop:20, padding:"12px 16px", background:"rgba(167,139,250,.07)", border:"1px solid rgba(167,139,250,.18)", borderRadius:12, fontSize:12, color:"rgba(255,255,255,.42)", lineHeight:1.7 }}>
                💡 <strong style={{color:"rgba(167,139,250,.8)"}}>PNG</strong>는 512×512 고해상도 저장 · <strong style={{color:"rgba(245,158,11,.8)"}}>움직이는 이모티콘</strong>은 SVG로 저장해야 애니메이션 유지
              </div>
            )}
          </div>
        )}

        {!loading && Object.keys(results).length === 0 && (
          <div style={{ textAlign:"center", padding:"52px 20px", animation:"fadeSlideIn .6s ease .3s both" }}>
            <div style={{ fontSize:52, marginBottom:12, animation:"float 3s ease-in-out infinite" }}>{mode==="image"?"📷":"🎨"}</div>
            <p style={{ color:"rgba(255,255,255,.2)", fontSize:14 }}>
              {mode==="image" ? "사진을 업로드하고 생성 버튼을 눌러보세요!" : "프롬프트를 입력하고 생성 버튼을 눌러보세요!"}
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
